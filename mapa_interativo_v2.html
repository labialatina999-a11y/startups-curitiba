<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startups em Curitiba - Blueprint</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h1>STARTUPS EM CURITIBA</h1>
  <h2>Mapa Interativo Estilo Blueprint</h2>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([-25.429, -49.267], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      opacity: 0.2
    }).addTo(map);

    fetch('startups_data.json')
      .then(response => response.json())
      .then(data => {
        data.forEach(startup => {
          const marker = L.circleMarker([startup.lat, startup.lng], {
            radius: 6,
            color: '#ffffff',
            fillColor: '#ffffff',
            fillOpacity: 0.9
          }).addTo(map);

          marker.bindPopup(`
            <strong>${startup.nome}</strong><br>
            CNPJ: ${startup.cnpj}<br>
            Bairro: ${startup.bairro}<br>
            Cidade: ${startup.cidade}
          `);
        });
      });
  </script>
</body>
</html>
