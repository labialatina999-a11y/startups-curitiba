<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Startups - Paraná</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #1a202c; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 2rem 2rem 0 2rem; }
        .hero-content { max-width: 1400px; margin: 0 auto; }
        .nav-tabs { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        .tab-button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 0.75rem 1.5rem; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; }
        .tab-button.active { background: white; color: #0f172a; }
        .tab-content { max-width: 1400px; margin: 1.5rem auto; padding: 0 1.5rem; }
        #map { height: 600px; width: 100%; border-radius: 0.75rem; }
        .grid-main { display: flex; flex-wrap: wrap; gap: 1rem; }
        .map-card { flex: 2; min-width: 300px; }
        .list-card { flex: 1; min-width: 300px; background: white; border-radius: 0.75rem; overflow-y: auto; max-height: 600px; }
        .startup-item { padding: 1rem; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
        .startup-item:hover { background: #f8fafc; }
        .area-badge { font-size: 0.65rem; background: #e0e7ff; color: #4338ca; padding: 0.2rem 0.5rem; border-radius: 12px; }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-content">
        <h1>Mapa de Startups · Paraná</h1>
        <div class="nav-tabs">
            <button class="tab-button active" onclick="openTab('tab-mapa')">Mapa Interativo</button>
            <button class="tab-button" onclick="openTab('tab-conteudo')">Conteúdos</button>
        </div>
    </div>
</div>

<div id="tab-mapa" class="tab-content">
    <input type="text" id="searchInput" placeholder="Buscar startup..." style="width:100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc;">
    <div class="grid-main">
        <div class="map-card"><div id="map"></div></div>
        <div class="list-card" id="startupListContainer"></div>
    </div>
</div>

<div id="tab-conteudo" class="tab-content" style="display:none;">
    <div style="background: white; padding: 2rem; border-radius: 12px;">
        <h2>Matérias e Vídeos</h2>
        <p>Espaço reservado para o seu player de vídeo aqui.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let startupsData = [], map, markers = [];

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
        if (tabId === 'tab-mapa' && map) map.invalidateSize();
    }

    function limparArea(texto) {
        if (typeof texto !== 'string') return 'Tecnologia';
        const match = texto.match(/'text':\s*'([^']+)'/);
        return match ? match[1] : texto.replace(/[\[\]'"{}:]/g, '').trim();
    }

    function initMap() {
        map = L.map('map').setView([-25.4284, -49.2733], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(map);
    }

    async function loadData() {
        try {
            const response = await fetch('startups_data.json');
            const data = await response.json();
            startupsData = data.map(s => ({
                ...s,
                area_atuacao: limparArea(s.area_atuacao),
                lat: s.lat || (s.localizacao ? s.localizacao.latitude : null),
                lng: s.lng || (s.localizacao ? s.localizacao.longitude : null)
            })).filter(s => s.lat && s.lng);
            renderMapAndList('');
        } catch(e) { console.error("Erro ao carregar:", e); }
    }

    function renderMapAndList(filter) {
        markers.forEach(m => map.removeLayer(m)); markers = [];
        const filtered = startupsData.filter(s => (s.nome || '').toLowerCase().includes(filter.toLowerCase()));
        
        const container = document.getElementById('startupListContainer');
        container.innerHTML = filtered.map((s, idx) => `
            <div class="startup-item" onclick="zoomTo(${idx})">
                <div style="font-weight:700">${s.nome}</div>
                <span class="area-badge">${s.area_atuacao}</span>
            </div>
        `).join('');

        filtered.forEach(s => {
            const m = L.marker([s.lat, s.lng]).addTo(map).bindPopup(s.nome);
            markers.push(m);
        });
    }

    function zoomTo(idx) {
        const s = startupsData[idx];
        map.setView([s.lat, s.lng], 16);
    }

    document.addEventListener('DOMContentLoaded', () => { initMap(); loadData(); document.getElementById('searchInput').addEventListener('input', (e) => renderMapAndList(e.target.value)); });
</script>
</body>
</html>
