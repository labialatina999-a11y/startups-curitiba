<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startups em Curitiba - Blueprint</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h1>STARTUPS EM CURITIBA</h1>
  <h2>Mapa Interativo Estilo Blueprint</h2>
  <div id="controls">
    <h3>Filtros por Bairro</h3>
    <div id="filter-container"></div>
    <h3>Lista de Startups</h3>
    <ul id="startup-list"></ul>
  </div>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([-25.429, -49.267], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      opacity: 0.25
    }).addTo(map);

    let markers = [];
    let bairros = new Set();

    fetch('startups_data.json')
      .then(response => response.json())
      .then(data => {
        data.forEach(startup => {
          bairros.add(startup.bairro);

          const marker = L.circleMarker([startup.lat, startup.lng], {
            radius: 6,
            color: '#ffffff',
            fillColor: '#ffffff',
            fillOpacity: 0.9
          }).addTo(map);

          marker.bindPopup(`
            <strong>${startup.nome}</strong><br>
            CNPJ: ${startup.cnpj}<br>
            Bairro: ${startup.bairro}<br>
            Cidade: ${startup.cidade}
          `);

          markers.push({ marker, startup });
        });

        // Criar filtros por bairro
        const filterContainer = document.getElementById('filter-container');
        bairros.forEach(bairro => {
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = true;
          checkbox.id = bairro;

          const label = document.createElement('label');
          label.htmlFor = bairro;
          label.innerText = bairro;

          checkbox.addEventListener('change', () => {
            markers.forEach(obj => {
              if (obj.startup.bairro === bairro) {
                if (checkbox.checked) {
                  obj.marker.addTo(map);
                } else {
                  map.removeLayer(obj.marker);
                }
              }
            });
          });

          filterContainer.appendChild(checkbox);
          filterContainer.appendChild(label);
          filterContainer.appendChild(document.createElement('br'));
        });

        // Lista de startups
        const list = document.getElementById('startup-list');
        data.forEach(startup => {
          const li = document.createElement('li');
          li.innerText = startup.nome;
          li.style.cursor = 'pointer';
          li.addEventListener('click', () => {
            map.setView([startup.lat, startup.lng], 15);
          });
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
