<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Mapa Interativo - Startups de Curitiba</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/leaflet.markercluster.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        #map {
            flex: 1;
            z-index: 1;
            background: #e0e0e0;
        }

        .sidebar {
            width: 380px;
            background: white;
            box-shadow: -2px 0 15px rgba(0,0,0,0.15);
            overflow-y: auto;
            z-index: 2;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1F4E78 0%, #2c5aa0 100%);
            color: white;
            padding: 20px;
            flex-shrink: 0;
            border-radius: 0 0 10px 0;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            display: block;
        }

        .search-box {
            padding: 15px;
            flex-shrink: 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1F4E78;
            box-shadow: 0 0 5px rgba(31, 78, 120, 0.2);
        }

        .search-box input::placeholder {
            color: #999;
        }

        .startups-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .startup-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .startup-item:hover {
            background: #f0f0f0;
            border-left-color: #1F4E78;
            transform: translateX(3px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .startup-item.active {
            background: #e3f2fd;
            border: 2px solid #1F4E78;
            border-left: 4px solid #1F4E78;
        }

        .startup-item h3 {
            font-size: 12px;
            color: #333;
            margin-bottom: 4px;
            font-weight: 600;
            line-height: 1.3;
        }

        .startup-item p {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .startup-item .cnpj {
            font-size: 10px;
            color: #999;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1F4E78;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 13px;
        }

        .filter-buttons {
            padding: 10px;
            flex-shrink: 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #f0f0f0;
        }

        .filter-btn.active {
            background: #1F4E78;
            color: white;
            border-color: #1F4E78;
        }

        .footer {
            padding: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 10px;
            color: #999;
            text-align: center;
            flex-shrink: 0;
        }

        .leaflet-popup-content {
            font-size: 12px !important;
        }

        .leaflet-popup-content strong {
            color: #1F4E78;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: 40%;
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                border-radius: 10px 10px 0 0;
                box-shadow: 0 -2px 15px rgba(0,0,0,0.15);
            }

            #map {
                height: 60%;
            }

            .container {
                flex-direction: column;
            }

            .header h1 {
                font-size: 16px;
            }
        }

        .scrollbar-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }

        .startups-list {
            scrollbar-width: thin;
            scrollbar-color: #ddd #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <div class="header">
                <h1>🗺️ Startups Curitiba</h1>
                <p>Mapeamento interativo com dados reais</p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-number" id="totalCount">0</span>
                        <span>Startups</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">✅</span>
                        <span>CNPJ Validado</span>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar por nome ou CNPJ...">
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterByResponsible('todos')">Todos</button>
                <button class="filter-btn" onclick="filterByResponsible('Gabriel')">Gabriel</button>
                <button class="filter-btn" onclick="filterByResponsible('Stresser')">Stresser</button>
                <button class="filter-btn" onclick="filterByResponsible('Tadeu')">Tadeu</button>
                <button class="filter-btn" onclick="filterByResponsible('Gloria')">Gloria</button>
            </div>

            <div class="startups-list scrollbar-custom" id="startupsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando startups...</p>
                </div>
            </div>

            <div class="footer">
                <p>Dados atualizados: <span id="lastUpdate">Carregando...</span></p>
                <p>Pauta para Prêmio Sebrae de Jornalismo 2025/2026</p>
            </div>
        </div>
    </div>

    <script>
        let map;
        let markers = [];
        let markerLayer;
        let allStartups = [];
        let filteredStartups = [];
        let currentFilter = 'todos';

        // Inicializar mapa
        function initMap() {
            map = L.map('map').setView([-25.4244, -49.2677], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap | © Projeto Startups Curitiba',
                maxZoom: 19,
                minZoom: 10
            }).addTo(map);

            // Carregar dados
            loadStartups();
        }

        // Carregar dados do JSON
        function loadStartups() {
            fetch('startups_data.json')
                .then(response => {
                    if (!response.ok) throw new Error('Erro ao carregar dados');
                    return response.json();
                })
                .then(data => {
                    allStartups = data;
                    filteredStartups = data;
                    renderStartupsList();
                    renderMarkers();
                    updateStats();
                    updateLastUpdate();
                })
                .catch(error => {
                    console.error('Erro:', error);
                    document.getElementById('startupsList').innerHTML = 
                        `<div class="no-results">⚠️ Erro ao carregar dados<br>${error.message}</div>`;
                });
        }

        // Renderizar lista
        function renderStartupsList() {
            const listHTML = filteredStartups.length > 0
                ? filteredStartups.map(startup => `
                    <div class="startup-item" onclick="selectStartup(${startup.id})">
                        <h3>${startup.nome}</h3>
                        <p>👤 ${startup.responsavel}</p>
                        <p class="cnpj">CNPJ: ${startup.cnpj}</p>
                        <p>📍 ${startup.bairro}</p>
                    </div>
                `).join('')
                : '<div class="no-results">Nenhuma startup encontrada</div>';

            document.getElementById('startupsList').innerHTML = listHTML;
        }

        // Renderizar marcadores
        function renderMarkers() {
            // Limpar marcadores antigos
            if (markerLayer) map.removeLayer(markerLayer);
            markerLayer = L.featureGroup();

            filteredStartups.forEach(startup => {
                const marker = L.circleMarker([startup.lat, startup.lng], {
                    radius: 8,
                    fillColor: '#1F4E78',
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                })
                .bindPopup(`
                    <div style="font-size: 12px;">
                        <strong style="color: #1F4E78;">${startup.nome}</strong><br>
                        <small>CNPJ: ${startup.cnpj}</small><br>
                        <small>👤 ${startup.responsavel}</small><br>
                        <small>📍 ${startup.bairro}</small>
                    </div>
                `)
                .on('click', () => selectStartup(startup.id))
                .addTo(markerLayer);

                markers.push({
                    id: startup.id,
                    marker: marker,
                    startup: startup
                });
            });

            markerLayer.addTo(map);

            // Ajustar zoom
            if (filteredStartups.length > 0) {
                setTimeout(() => {
                    map.fitBounds(markerLayer.getBounds().pad(0.1));
                }, 100);
            }
        }

        // Selecionar startup
        function selectStartup(id) {
            const startup = allStartups.find(s => s.id === id);
            if (startup) {
                map.setView([startup.lat, startup.lng], 15);
                
                // Highlight no mapa
                markers.forEach(m => {
                    if (m.id === id) {
                        m.marker.setStyle({ radius: 12, fillOpacity: 1 });
                        m.marker.openPopup();
                    } else {
                        m.marker.setStyle({ radius: 8, fillOpacity: 0.8 });
                    }
                });

                // Highlight na lista
                document.querySelectorAll('.startup-item').forEach(item => {
                    item.classList.remove('active');
                });
                document.querySelectorAll('.startup-item')[
                    filteredStartups.findIndex(s => s.id === id)
                ]?.classList.add('active');
            }
        }

        // Buscar
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredStartups = allStartups.filter(s =>
                s.nome.toLowerCase().includes(term) ||
                s.cnpj.includes(term) ||
                s.responsavel.toLowerCase().includes(term) ||
                s.bairro.toLowerCase().includes(term)
            );

            // Aplicar filtro por responsável se ativo
            if (currentFilter !== 'todos') {
                filteredStartups = filteredStartups.filter(s => 
                    s.responsavel === currentFilter
                );
            }

            renderStartupsList();
            renderMarkers();
        });

        // Filtrar por responsável
        function filterByResponsible(responsible) {
            currentFilter = responsible;
            
            if (responsible === 'todos') {
                filteredStartups = allStartups;
            } else {
                filteredStartups = allStartups.filter(s => s.responsavel === responsible);
            }

            // Atualizar botões
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderStartupsList();
            renderMarkers();
        }

        // Atualizar stats
        function updateStats() {
            document.getElementById('totalCount').textContent = filteredStartups.length;
        }

        // Atualizar última atualização
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR');
        }

        // Inicializar ao carregar
        window.addEventListener('load', initMap);

        // Auto-refresh a cada 5 minutos
        setInterval(() => {
            loadStartups();
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
